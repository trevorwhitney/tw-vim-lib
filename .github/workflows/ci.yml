name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (luacheck + statix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: make lint
        run: nix develop --command make lint

  test-lua:
    name: Standalone Lua tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: make test-lua
        run: nix develop --command make test-lua

  test-plenary:
    name: Plenary specs (headless nvim)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      # tests/setup.sh clones plenary.nvim and pins it to a fixed commit.
      # Cache the pinned checkout so we don't re-clone on every run.
      - name: Cache pinned plenary.nvim
        uses: actions/cache@v4
        with:
          path: tests/.deps/plenary.nvim
          key: plenary-${{ hashFiles('tests/setup.sh') }}

      - name: make test-plenary
        run: nix develop --command make test-plenary
